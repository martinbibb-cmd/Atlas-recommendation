<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="One-pipe heating circuit loop">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">One-Pipe Circuit</text>
  <!-- Single pipe loop -->
  <!-- Main loop: top, right, bottom, left -->
  <rect x="25" y="28" width="150" height="110" rx="8" fill="none" stroke="#ef4444" stroke-width="3.5"/>
  <!-- Boiler (bottom-left) -->
  <rect x="18" y="105" width="50" height="40" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <text x="43" y="129" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#eff6ff" font-weight="bold">BOILER</text>
  <!-- Pump on main pipe -->
  <circle cx="100" cy="138" r="10" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <text x="100" y="142" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb" font-weight="bold">P</text>
  <!-- Radiator 1 (top-left) -->
  <rect x="30" y="20" width="40" height="20" rx="2" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <line x1="37" y1="20" x2="37" y2="40" stroke="#f87171" stroke-width="1"/>
  <line x1="44" y1="20" x2="44" y2="40" stroke="#f87171" stroke-width="1"/>
  <line x1="51" y1="20" x2="51" y2="40" stroke="#f87171" stroke-width="1"/>
  <line x1="58" y1="20" x2="58" y2="40" stroke="#f87171" stroke-width="1"/>
  <!-- Radiator 2 (top-right) -->
  <rect x="130" y="20" width="40" height="20" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="137" y1="20" x2="137" y2="40" stroke="#f59e0b" stroke-width="1"/>
  <line x1="144" y1="20" x2="144" y2="40" stroke="#f59e0b" stroke-width="1"/>
  <line x1="151" y1="20" x2="151" y2="40" stroke="#f59e0b" stroke-width="1"/>
  <line x1="158" y1="20" x2="158" y2="40" stroke="#f59e0b" stroke-width="1"/>
  <!-- Radiator 3 (right side) -->
  <rect x="163" y="65" width="20" height="35" rx="2" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <line x1="163" y1="72" x2="183" y2="72" stroke="#34d399" stroke-width="1"/>
  <line x1="163" y1="79" x2="183" y2="79" stroke="#34d399" stroke-width="1"/>
  <line x1="163" y1="86" x2="183" y2="86" stroke="#34d399" stroke-width="1"/>
  <line x1="163" y1="93" x2="183" y2="93" stroke="#34d399" stroke-width="1"/>
  <!-- Flow direction arrows on main pipe -->
  <polygon points="108,25 115,28 108,31" fill="#ef4444"/>
  <polygon points="175,80 178,87 172,87" fill="#ef4444"/>
  <polygon points="92,141 85,138 92,135" fill="#ef4444"/>
  <!-- Bypass connections note -->
  <text x="100" y="88" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">Single loop</text>
  <text x="100" y="99" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">all rads in series</text>
  <!-- Boiler label -->
  <text x="43" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Boiler</text>
  <text x="100" y="154" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Pump</text>
</svg>
