<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Combination boiler">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Boiler body -->
  <rect x="55" y="20" width="90" height="90" rx="6" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Boiler panel / window -->
  <rect x="68" y="32" width="64" height="50" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <!-- Flame symbol -->
  <path d="M100 72 C96 64 104 58 100 50 C97 56 93 54 95 62 C92 58 90 54 92 48 C86 56 88 68 94 72 Z" fill="#f97316"/>
  <path d="M100 72 C104 64 96 58 100 50 C103 56 107 54 105 62 C108 58 110 54 108 48 C114 56 112 68 106 72 Z" fill="#fbbf24"/>
  <!-- Boiler label -->
  <text x="100" y="88" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1e3a8a" font-weight="bold">COMBI</text>
  <!-- Pipe — hot flow (red) -->
  <line x1="75" y1="110" x2="75" y2="140" stroke="#ef4444" stroke-width="4"/>
  <!-- Pipe — return (blue) -->
  <line x1="125" y1="110" x2="125" y2="140" stroke="#3b82f6" stroke-width="4"/>
  <!-- Gas pipe -->
  <line x1="100" y1="110" x2="100" y2="140" stroke="#6b7280" stroke-width="3" stroke-dasharray="4,2"/>
  <!-- Labels -->
  <text x="75" y="155" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#ef4444">Flow</text>
  <text x="125" y="155" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3b82f6">Return</text>
  <text x="100" y="155" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">Gas</text>
  <!-- Title -->
  <text x="100" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Combination Boiler</text>
</svg>
