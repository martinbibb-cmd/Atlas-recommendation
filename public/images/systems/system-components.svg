<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Heating system components overview showing boiler pump radiators and expansion vessel">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">System Components Overview</text>
  <!-- Boiler -->
  <rect x="10" y="55" width="50" height="55" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <text x="35" y="84" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#eff6ff" font-weight="bold">BOILER</text>
  <!-- Pump (inline) -->
  <circle cx="90" cy="70" r="12" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <text x="90" y="74" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb" font-weight="bold">P</text>
  <text x="90" y="96" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Pump</text>
  <!-- Expansion vessel -->
  <ellipse cx="90" cy="130" rx="16" ry="20" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <text x="90" y="128" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f9fafb">EXP</text>
  <text x="90" y="138" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f9fafb">VESSEL</text>
  <!-- Radiator 1 -->
  <rect x="135" y="25" width="50" height="30" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <line x1="144" y1="25" x2="144" y2="55" stroke="#f87171" stroke-width="1"/>
  <line x1="153" y1="25" x2="153" y2="55" stroke="#f87171" stroke-width="1"/>
  <line x1="162" y1="25" x2="162" y2="55" stroke="#f87171" stroke-width="1"/>
  <line x1="171" y1="25" x2="171" y2="55" stroke="#f87171" stroke-width="1"/>
  <text x="160" y="70" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Radiators</text>
  <!-- Radiator 2 -->
  <rect x="135" y="80" width="50" height="30" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <line x1="144" y1="80" x2="144" y2="110" stroke="#f87171" stroke-width="1"/>
  <line x1="153" y1="80" x2="153" y2="110" stroke="#f87171" stroke-width="1"/>
  <line x1="162" y1="80" x2="162" y2="110" stroke="#f87171" stroke-width="1"/>
  <line x1="171" y1="80" x2="171" y2="110" stroke="#f87171" stroke-width="1"/>
  <!-- Pipe connections -->
  <!-- Boiler flow → pump -->
  <line x1="60" y1="65" x2="78" y2="65" stroke="#ef4444" stroke-width="3"/>
  <!-- Pump → radiators (flow) -->
  <line x1="102" y1="65" x2="135" y2="40" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="102" y1="68" x2="135" y2="95" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Return from radiators → boiler -->
  <line x1="185" y1="55" x2="185" y2="135" stroke="#3b82f6" stroke-width="2"/>
  <line x1="185" y1="135" x2="60" y2="100" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Expansion vessel connection -->
  <line x1="90" y1="82" x2="90" y2="110" stroke="#374151" stroke-width="2"/>
  <!-- Pressure gauge -->
  <circle cx="60" cy="50" r="8" fill="#fff" stroke="#6b7280" stroke-width="1.5"/>
  <text x="60" y="54" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#374151">●</text>
  <text x="60" y="44" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#6b7280">Gauge</text>
  <!-- Labels -->
  <text x="35" y="55" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Boiler</text>
  <text x="90" y="156" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Expansion</text>
  <text x="90" y="164" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Vessel</text>
</svg>
