<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="System boiler">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">System Boiler</text>
  <!-- Boiler body -->
  <rect x="30" y="20" width="80" height="80" rx="6" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Boiler panel -->
  <rect x="40" y="30" width="60" height="45" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <!-- Flame -->
  <path d="M70 67 C67 60 74 55 70 48 C68 53 64 52 66 59 C63 55 62 51 64 46 C58 53 60 64 65 67 Z" fill="#f97316"/>
  <path d="M70 67 C73 60 66 55 70 48 C72 53 76 52 74 59 C77 55 78 51 76 46 C82 53 80 64 75 67 Z" fill="#fbbf24"/>
  <!-- Label -->
  <text x="70" y="82" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1e3a8a" font-weight="bold">SYSTEM</text>
  <!-- Expansion vessel (sealed) -->
  <ellipse cx="160" cy="50" rx="20" ry="25" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <ellipse cx="160" cy="50" rx="20" ry="5" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
  <text x="160" y="54" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb">EXP</text>
  <!-- Pipe connecting boiler to expansion vessel -->
  <line x1="110" y1="50" x2="140" y2="50" stroke="#374151" stroke-width="3"/>
  <!-- Flow pipe (red) -->
  <line x1="55" y1="100" x2="55" y2="140" stroke="#ef4444" stroke-width="4"/>
  <!-- Return pipe (blue) -->
  <line x1="85" y1="100" x2="85" y2="140" stroke="#3b82f6" stroke-width="4"/>
  <!-- Pipe to/from cylinder (right side) -->
  <line x1="110" y1="70" x2="135" y2="70" stroke="#ef4444" stroke-width="3"/>
  <line x1="110" y1="85" x2="135" y2="85" stroke="#3b82f6" stroke-width="3"/>
  <!-- Labels -->
  <text x="55" y="155" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#ef4444">Flow</text>
  <text x="85" y="155" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3b82f6">Return</text>
  <text x="148" y="80" font-family="sans-serif" font-size="7" fill="#6b7280">→ Cylinder</text>
</svg>
