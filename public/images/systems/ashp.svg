<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Air source heat pump outdoor unit">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Air Source Heat Pump</text>
  <!-- Ground -->
  <rect x="10" y="130" width="180" height="20" rx="2" fill="#d1fae5"/>
  <!-- Outdoor unit body -->
  <rect x="15" y="70" width="80" height="60" rx="5" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <!-- Fan circle -->
  <circle cx="55" cy="100" r="22" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Fan blades -->
  <ellipse cx="55" cy="82" rx="5" ry="14" fill="#9ca3af" transform="rotate(0 55 100)"/>
  <ellipse cx="55" cy="82" rx="5" ry="14" fill="#9ca3af" transform="rotate(60 55 100)"/>
  <ellipse cx="55" cy="82" rx="5" ry="14" fill="#9ca3af" transform="rotate(120 55 100)"/>
  <!-- Fan hub -->
  <circle cx="55" cy="100" r="4" fill="#d1d5db"/>
  <!-- Grille lines on body -->
  <line x1="15" y1="78" x2="95" y2="78" stroke="#6b7280" stroke-width="0.8"/>
  <line x1="15" y1="86" x2="28" y2="86" stroke="#6b7280" stroke-width="0.8"/>
  <line x1="82" y1="86" x2="95" y2="86" stroke="#6b7280" stroke-width="0.8"/>
  <!-- Refrigerant pipes to indoor unit -->
  <path d="M95 85 C110 85 110 55 125 55" stroke="#ef4444" stroke-width="3" fill="none"/>
  <path d="M95 110 C110 110 110 80 125 80" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <!-- Indoor unit / heat exchanger -->
  <rect x="125" y="40" width="55" height="60" rx="5" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <text x="152" y="68" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#eff6ff" font-weight="bold">HEAT</text>
  <text x="152" y="79" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#eff6ff" font-weight="bold">PUMP</text>
  <text x="152" y="90" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#eff6ff">UNIT</text>
  <!-- Air flow arrows -->
  <path d="M5 90 L15 90" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M5 100 L15 100" stroke="#6b7280" stroke-width="1.5"/>
  <path d="M5 110 L15 110" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Label outdoor unit -->
  <text x="55" y="145" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Outdoor Unit</text>
  <text x="152" y="115" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Indoor Unit</text>
</svg>
