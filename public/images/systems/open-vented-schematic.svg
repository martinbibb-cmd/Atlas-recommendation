<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Open-vented heating system with regular boiler, hot water cylinder and cold water cistern">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Regular Boiler — Open Vented</text>
  <!-- Cold water cistern (loft) -->
  <rect x="120" y="18" width="60" height="30" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="37" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1e40af">Cold Cistern</text>
  <!-- Hot water cylinder -->
  <rect x="115" y="68" width="30" height="60" rx="4" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="92" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">HOT</text>
  <text x="130" y="102" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">WATER</text>
  <!-- Vent pipe from cylinder up to cistern -->
  <line x1="130" y1="68" x2="130" y2="48" stroke="#6b7280" stroke-width="2"/>
  <!-- Feed pipe from cistern to cylinder -->
  <line x1="140" y1="48" x2="145" y2="68" stroke="#3b82f6" stroke-width="2"/>
  <!-- Boiler -->
  <rect x="20" y="85" width="65" height="55" rx="5" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <rect x="28" y="92" width="50" height="35" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <!-- Flame -->
  <path d="M53 120 C50 113 57 108 53 101 C51 106 47 105 49 112 C46 108 45 104 47 99 C41 106 43 117 48 120 Z" fill="#f97316"/>
  <path d="M53 120 C56 113 49 108 53 101 C55 106 59 105 57 112 C60 108 61 104 59 99 C65 106 63 117 58 120 Z" fill="#fbbf24"/>
  <text x="53" y="134" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1e3a8a" font-weight="bold">BOILER</text>
  <!-- Primary flow: boiler → cylinder -->
  <line x1="85" y1="100" x2="115" y2="100" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Primary return: cylinder → boiler -->
  <line x1="85" y1="115" x2="115" y2="115" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Arrows -->
  <polygon points="112,97 118,100 112,103" fill="#ef4444"/>
  <polygon points="88,112 82,115 88,118" fill="#3b82f6"/>
  <!-- Labels -->
  <text x="100" y="96" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#b91c1c">Primary flow</text>
  <text x="100" y="126" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#1d4ed8">Return</text>
</svg>
