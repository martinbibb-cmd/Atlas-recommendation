<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Vented hot water cylinder with cold water cistern">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Vented Cylinder</text>
  <!-- Cold water cistern (top) -->
  <rect x="115" y="18" width="65" height="28" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="147" y="36" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1e40af">Cold Cistern</text>
  <!-- Cylinder body -->
  <rect x="60" y="40" width="80" height="105" rx="12" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
  <!-- Cylinder inner detail (lagging) -->
  <rect x="66" y="46" width="68" height="93" rx="9" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <!-- Temperature labels on cylinder -->
  <text x="100" y="85" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#991b1b" font-weight="bold">HOT</text>
  <text x="100" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#991b1b" font-weight="bold">WATER</text>
  <text x="100" y="110" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#b91c1c">Vented</text>
  <!-- Vent pipe (safety) going up from top -->
  <line x1="100" y1="40" x2="100" y2="18" stroke="#6b7280" stroke-width="2.5"/>
  <path d="M95 22 L100 16 L105 22" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <text x="108" y="14" font-family="sans-serif" font-size="6" fill="#6b7280">Vent</text>
  <!-- Feed pipe from cistern -->
  <line x1="115" y1="36" x2="140" y2="52" stroke="#3b82f6" stroke-width="2"/>
  <!-- Hot draw-off at top -->
  <line x1="140" y1="46" x2="180" y2="46" stroke="#ef4444" stroke-width="2.5"/>
  <text x="182" y="49" font-family="sans-serif" font-size="7" fill="#b91c1c">Hot out</text>
  <!-- Cold in at bottom -->
  <line x1="140" y1="135" x2="180" y2="135" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="182" y="138" font-family="sans-serif" font-size="7" fill="#1d4ed8">Cold in</text>
  <!-- Primary coil (immersion coil) -->
  <path d="M72 80 C68 80 68 100 72 100 C76 100 76 80 80 80 C84 80 84 100 88 100" stroke="#f97316" stroke-width="2" fill="none"/>
  <text x="85" y="125" font-family="sans-serif" font-size="6" fill="#c2410c">← Coil</text>
</svg>
