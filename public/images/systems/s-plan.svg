<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="S-plan control wiring with two motorised zone valves">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">S-Plan — Two Zone Valves</text>
  <!-- Boiler (left) -->
  <rect x="10" y="60" width="45" height="50" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <text x="32" y="89" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#eff6ff" font-weight="bold">BOILER</text>
  <!-- Main flow pipe from boiler -->
  <line x1="55" y1="75" x2="80" y2="75" stroke="#ef4444" stroke-width="3"/>
  <!-- Zone valve 1 (heating) -->
  <rect x="80" y="60" width="40" height="30" rx="4" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <text x="100" y="77" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb" font-weight="bold">ZV1</text>
  <text x="100" y="87" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#d1d5db">Heating</text>
  <!-- Actuator on ZV1 -->
  <circle cx="100" cy="60" r="8" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <text x="100" y="64" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f9fafb">M</text>
  <!-- Flow to heating zone -->
  <line x1="120" y1="75" x2="175" y2="75" stroke="#ef4444" stroke-width="3"/>
  <!-- Zone 1 radiators -->
  <rect x="155" y="60" width="35" height="25" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text x="172" y="71" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">CH</text>
  <text x="172" y="81" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">Zone</text>
  <!-- Second flow pipe splits to ZV2 -->
  <line x1="55" y1="105" x2="80" y2="105" stroke="#ef4444" stroke-width="3"/>
  <!-- Zone valve 2 (hot water) -->
  <rect x="80" y="90" width="40" height="30" rx="4" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <text x="100" y="107" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb" font-weight="bold">ZV2</text>
  <text x="100" y="117" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#d1d5db">Hot Water</text>
  <!-- Actuator on ZV2 -->
  <circle cx="100" cy="90" r="8" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <text x="100" y="94" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f9fafb">M</text>
  <!-- Flow to cylinder -->
  <line x1="120" y1="105" x2="155" y2="105" stroke="#ef4444" stroke-width="3"/>
  <!-- Cylinder -->
  <rect x="155" y="90" width="35" height="35" rx="6" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="172" y="108" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">HW</text>
  <text x="172" y="118" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">Cylinder</text>
  <!-- Return pipe (blue) from both zones back to boiler -->
  <line x1="55" y1="140" x2="155" y2="140" stroke="#3b82f6" stroke-width="3"/>
  <line x1="175" y1="85" x2="175" y2="140" stroke="#3b82f6" stroke-width="2"/>
  <line x1="172" y1="125" x2="172" y2="140" stroke="#3b82f6" stroke-width="2"/>
  <line x1="55" y1="110" x2="55" y2="140" stroke="#3b82f6" stroke-width="3"/>
  <polygon points="58,112 52,112 55,106" fill="#3b82f6"/>
  <!-- Pump -->
  <circle cx="55" cy="90" r="10" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <text x="55" y="94" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb">P</text>
  <text x="55" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">Pump</text>
</svg>
