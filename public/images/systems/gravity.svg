<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Gravity-fed open-vented heating circuit">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Gravity Circuit (Open Vented)</text>
  <!-- Loft cistern -->
  <rect x="120" y="18" width="60" height="25" rx="3" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="34" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1e40af">Feed/Exp.</text>
  <!-- Hot water cylinder -->
  <rect x="110" y="60" width="35" height="80" rx="8" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="127" y="98" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">HW</text>
  <text x="127" y="108" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">Cylinder</text>
  <!-- Vent pipe from cylinder to cistern -->
  <line x1="127" y1="60" x2="127" y2="43" stroke="#6b7280" stroke-width="2"/>
  <line x1="127" y1="43" x2="145" y2="43" stroke="#6b7280" stroke-width="2"/>
  <!-- Feed from cistern to cylinder -->
  <line x1="140" y1="43" x2="140" y2="60" stroke="#3b82f6" stroke-width="2"/>
  <!-- Boiler -->
  <rect x="20" y="95" width="65" height="50" rx="5" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <rect x="27" y="101" width="52" height="35" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <!-- Flame -->
  <path d="M53 130 C50 123 57 118 53 111 C51 116 47 115 49 122 C46 118 45 114 47 109 C41 116 43 127 48 130 Z" fill="#f97316"/>
  <path d="M53 130 C56 123 49 118 53 111 C55 116 59 115 57 122 C60 118 61 114 59 109 C65 116 63 127 58 130 Z" fill="#fbbf24"/>
  <text x="53" y="142" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1e3a8a" font-weight="bold">BOILER</text>
  <!-- Gravity primary flow: boiler → cylinder (hot rises) -->
  <line x1="85" y1="105" x2="110" y2="90" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="105,86 112,92 105,96" fill="#ef4444"/>
  <!-- Primary return: cylinder → boiler (cool falls) -->
  <line x1="110" y1="128" x2="85" y2="130" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="90,126 82,130 90,134" fill="#3b82f6"/>
  <!-- Gravity arrows on flow -->
  <text x="100" y="84" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#b91c1c">↑ Hot rises</text>
  <text x="100" y="145" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#1d4ed8">↓ Cool returns</text>
  <!-- No pump note -->
  <text x="52" y="90" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">No pump</text>
</svg>
