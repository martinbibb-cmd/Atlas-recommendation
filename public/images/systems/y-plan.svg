<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Y-plan control wiring with mid-position valve">
  <rect width="200" height="160" fill="#f8fafc" rx="4"/>
  <!-- Title -->
  <text x="100" y="12" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-weight="600">Y-Plan — Mid-Position Valve</text>
  <!-- Boiler (left) -->
  <rect x="10" y="60" width="45" height="55" rx="4" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  <text x="32" y="92" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#eff6ff" font-weight="bold">BOILER</text>
  <!-- Pump -->
  <circle cx="75" cy="90" r="11" fill="#6b7280" stroke="#4b5563" stroke-width="2"/>
  <text x="75" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#f9fafb" font-weight="bold">P</text>
  <!-- Flow pipe to mid-pos valve -->
  <line x1="55" y1="80" x2="86" y2="80" stroke="#ef4444" stroke-width="3"/>
  <line x1="55" y1="100" x2="64" y2="100" stroke="#ef4444" stroke-width="3"/>
  <line x1="64" y1="80" x2="64" y2="100" stroke="#ef4444" stroke-width="2"/>
  <line x1="86" y1="80" x2="100" y2="80" stroke="#ef4444" stroke-width="3"/>
  <!-- Mid-position valve body -->
  <rect x="100" y="55" width="45" height="50" rx="5" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <text x="122" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb" font-weight="bold">MID-POS</text>
  <text x="122" y="89" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb">VALVE</text>
  <text x="122" y="99" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#d1d5db">3-port</text>
  <!-- Actuator -->
  <circle cx="122" cy="55" r="10" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <text x="122" y="59" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#f9fafb">M</text>
  <!-- Port A (to heating) -->
  <line x1="145" y1="70" x2="180" y2="70" stroke="#ef4444" stroke-width="3"/>
  <!-- Radiator -->
  <rect x="158" y="58" width="35" height="22" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text x="175" y="70" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#991b1b">CH</text>
  <!-- Port B (to hot water) -->
  <line x1="145" y1="95" x2="180" y2="95" stroke="#ef4444" stroke-width="3"/>
  <!-- Cylinder -->
  <rect x="158" y="85" width="35" height="35" rx="6" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="175" y="100" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">HW</text>
  <text x="175" y="112" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#991b1b">Cyl.</text>
  <!-- Mid-position: both ports open simultaneously -->
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">Mid: both CH + HW open</text>
  <!-- Return (blue) -->
  <line x1="55" y1="115" x2="185" y2="115" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="175" y1="107" x2="175" y2="115" stroke="#3b82f6" stroke-width="2"/>
  <line x1="185" y1="70" x2="185" y2="115" stroke="#3b82f6" stroke-width="2"/>
</svg>
